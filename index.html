<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Walk Streak</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #161e15;
      --surface:    #1f2b1e;
      --surface2:   #263325;
      --border:     #2e3d2d;
      --sage:       #8aab85;
      --sage-dim:   #5a7a56;
      --terra:      #c47d5a;
      --terra-dim:  #7a4d37;
      --sky:        #7aaec4;
      --sky-dim:    #3d6e85;
      --text:       #d6e8d3;
      --text-dim:   #7a9475;
      --missed:     #3a2020;
      --missed-dot: #6b3535;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--sage);
    }

    header p {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-top: 0.3rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 420px;
      margin-bottom: 1rem;
    }

    /* ── Streak hero ── */
    .streak-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .streak-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .streak-number {
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      color: var(--terra);
      text-shadow: 0 0 40px rgba(196,125,90,0.35);
    }

    .streak-unit {
      font-size: 0.9rem;
      color: var(--text-dim);
    }

    /* ── Log button ── */
    .log-btn {
      display: block;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
      margin-bottom: 1rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
      letter-spacing: 0.02em;
    }

    .log-btn.ready {
      background: var(--sage);
      color: var(--bg);
    }

    .log-btn.ready:hover { background: #9fc49a; }
    .log-btn.ready:active { transform: scale(0.98); }

    .log-btn.done {
      background: var(--surface2);
      color: var(--sage-dim);
      border: 1px solid var(--border);
      cursor: default;
    }

    /* ── Calendar ── */
    .calendar-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }

    .dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 4px;
    }

    .dow-cell {
      text-align: center;
      font-size: 0.65rem;
      color: var(--text-dim);
      padding: 2px 0;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-day {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 500;
      position: relative;
      border: 1px solid transparent;
    }

    .cal-day.future {
      background: transparent;
      color: transparent;
    }

    .cal-day.empty {
      background: var(--surface2);
      color: var(--text-dim);
      opacity: 0.4;
    }

    .cal-day.missed {
      background: var(--missed);
      color: var(--missed-dot);
      border-color: #2e1818;
    }

    .cal-day.walked {
      background: rgba(138,171,133,0.18);
      color: var(--sage);
      border-color: var(--sage-dim);
    }

    .cal-day.today {
      border-color: var(--sky);
      color: var(--sky);
    }

    .cal-day.walked.today {
      background: rgba(138,171,133,0.28);
      border-color: var(--sage);
      color: var(--sage);
      box-shadow: 0 0 10px rgba(138,171,133,0.2);
    }

    .cal-day .dot {
      position: absolute;
      bottom: 3px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--sage);
    }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }

    .stat {
      background: var(--surface2);
      border-radius: 10px;
      padding: 0.85rem 0.5rem;
      text-align: center;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-value.green  { color: var(--sage); }
    .stat-value.terra  { color: var(--terra); }
    .stat-value.sky    { color: var(--sky); }

    .stat-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

<header>
  <h1>Walk Streak</h1>
  <p id="date-display"></p>
</header>

<div class="card streak-card">
  <div class="streak-label">Current Streak</div>
  <div class="streak-number" id="streak-num">0</div>
  <div class="streak-unit" id="streak-unit">days</div>
</div>

<button class="log-btn ready" id="log-btn" onclick="logWalk()">Log today's walk</button>

<div class="card">
  <div class="calendar-title">Last 5 weeks</div>
  <div class="dow-row">
    <div class="dow-cell">Su</div>
    <div class="dow-cell">Mo</div>
    <div class="dow-cell">Tu</div>
    <div class="dow-cell">We</div>
    <div class="dow-cell">Th</div>
    <div class="dow-cell">Fr</div>
    <div class="dow-cell">Sa</div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div class="card">
  <div class="stats-grid">
    <div class="stat">
      <div class="stat-value green" id="stat-total">0</div>
      <div class="stat-label">Total walks</div>
    </div>
    <div class="stat">
      <div class="stat-value terra" id="stat-month">0</div>
      <div class="stat-label">This month</div>
    </div>
    <div class="stat">
      <div class="stat-value sky" id="stat-rate">0%</div>
      <div class="stat-label">30-day rate</div>
    </div>
  </div>
</div>

<script>
  const KEY = 'walk-streak-days';

  function toDateStr(d) {
    return d.toISOString().slice(0, 10);
  }

  function today() {
    return toDateStr(new Date());
  }

  function loadDays() {
    try { return new Set(JSON.parse(localStorage.getItem(KEY)) || []); }
    catch { return new Set(); }
  }

  function saveDays(set) {
    localStorage.setItem(KEY, JSON.stringify([...set]));
  }

  function calcStreak(days) {
    const t = today();
    let streak = 0;
    let cursor = new Date();
    // If today not walked, streak can still be alive from yesterday
    if (!days.has(t)) {
      cursor.setDate(cursor.getDate() - 1);
    }
    while (days.has(toDateStr(cursor))) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    }
    return streak;
  }

  function render() {
    const days = loadDays();
    const t = today();
    const now = new Date();

    // Header date
    document.getElementById('date-display').textContent =
      now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    // Streak
    const streak = calcStreak(days);
    document.getElementById('streak-num').textContent = streak;
    document.getElementById('streak-unit').textContent = streak === 1 ? 'day' : 'days';

    // Button
    const btn = document.getElementById('log-btn');
    if (days.has(t)) {
      btn.textContent = "Today's walk logged ✓";
      btn.className = 'log-btn done';
    } else {
      btn.textContent = "Log today's walk";
      btn.className = 'log-btn ready';
    }

    // Calendar — 5 weeks (35 cells), ending on the last Saturday >= today
    const cal = document.getElementById('cal-grid');
    cal.innerHTML = '';

    // Find the Sunday that starts our 5-week window
    const endSat = new Date(now);
    endSat.setDate(endSat.getDate() + (6 - endSat.getDay())); // next/current Saturday
    const startSun = new Date(endSat);
    startSun.setDate(startSun.getDate() - 34); // 35 days total

    for (let i = 0; i < 35; i++) {
      const d = new Date(startSun);
      d.setDate(startSun.getDate() + i);
      const ds = toDateStr(d);
      const isToday = ds === t;
      const isFuture = ds > t;
      const walked = days.has(ds);

      const cell = document.createElement('div');
      cell.className = 'cal-day';

      if (isFuture) {
        cell.classList.add('future');
      } else if (walked) {
        cell.classList.add('walked');
        if (isToday) cell.classList.add('today');
        const dot = document.createElement('div');
        dot.className = 'dot';
        cell.appendChild(dot);
        cell.title = ds;
      } else {
        cell.classList.add('missed');
        if (isToday) cell.classList.add('today');
        cell.title = ds;
      }

      cell.textContent = d.getDate();
      cal.appendChild(cell);
    }

    // Stats
    document.getElementById('stat-total').textContent = days.size;

    const monthStr = today().slice(0, 7);
    const monthCount = [...days].filter(d => d.startsWith(monthStr)).length;
    document.getElementById('stat-month').textContent = monthCount;

    const thirtyAgo = new Date(now);
    thirtyAgo.setDate(thirtyAgo.getDate() - 29);
    const thirtyAgoStr = toDateStr(thirtyAgo);
    const last30 = [...days].filter(d => d >= thirtyAgoStr && d <= t).length;
    document.getElementById('stat-rate').textContent = Math.round((last30 / 30) * 100) + '%';
  }

  function logWalk() {
    const days = loadDays();
    const t = today();
    if (days.has(t)) return;
    days.add(t);
    saveDays(days);
    render();
  }

  render();
</script>
</body>
</html>
